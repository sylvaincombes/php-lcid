name: CI

on:
  push:
    branches: ["main", "v2.0.0"]
  pull_request:

jobs:
  tests:
    name: PHP ${{ matrix.php }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        php: ["8.4"]

    steps:
      - uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: intl
          coverage: none

      - name: Install dependencies
        run: composer install --no-interaction --prefer-dist --optimize-autoloader

      - name: Tests
        run: composer test

      - name: PHP CS Fixer (lint)
        run: composer lint

      - name: PHPStan
        run: composer phpstan

      - name: Psalm
        run: composer psalm
